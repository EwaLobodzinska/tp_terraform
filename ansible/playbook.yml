- name: Deploiement de NGINX
  hosts: all
  become: yes

  tasks:

    - name: 1) mettre a jour le cache APT
      ansible.builtin.apt:
        update_cache: yes

    - name: 2) installer NGINX
      ansible.builtin.apt:
        name: nginx
        state: present

    - name: 3) demarrer le service et activer au demarrage
      ansible.builtin.service:
        name: nginx
        state: started
        enabled: yes